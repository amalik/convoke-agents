on) + `/node_modules/` (defensive — shouldn't appear under `_bmad/`) + file mtimes ignored entirely (sandbox A's files are written milliseconds after B's; comparing CONTENTS not stat is the only correct mode). Centralized as `PARITY_EXCLUSIONS` constant exported by simulator for shared-test-constants Rule. **5 Tasks:** Task 0 pre-flight (baseline test count + marketplace.json schema check + node:test runner glob sanity); Task 1 DS1-DS3 spikes (DS1 = PluginResolver materialization vs registration behavior; DS2 = source-relative path preservation vs flattening to .claude/skills/; DS3 = exclusion-list completeness check via interactive `refreshInstallation` inspection); Task 2 author simulator (~50-80 LOC); Task 3 author parity test (~150-220 LOC, ≥4 cases: parity-of-skills, parity-of-module_definition, drift-detection-fails-loudly, exclusion-list-applied); Task 4 verify perf budget (likeliest culprit: refreshInstallation at ~3-5s); Task 5 validation gates. **3 DEF-SPIKEs:** DS1 (PluginResolver behavior on community modules — verified provisional via `_bmad/core/skills/bmad-distillator/resources/distillate-format-reference.md` lines 188+ which mention `.claude-plugin/marketplace.json` discovery; concrete spike still required); DS2 (path preservation vs rewrite — could investigate via whiteport-design-studio post-install layout); DS3 (exclusion list adequacy). **Critical risk PR1:** if DS1 reveals PluginResolver flattens `skills[]` paths (e.g., `_bmad/bme/_vortex/agents/<id>` → `.claude/skills/<id>`), Decision 1's filesystem-path-based comparison becomes impossible — would need normalized comparison ("content-equality regardless of destination path layout"). Surface to user. **Pattern reuse:** `tests/integration/fresh-install.test.js` (structural template for before/after + mkdtemp); `tests/integration/installer-e2e.test.js` (closest "two-install" idiom); `scripts/update/lib/refresh-installation.js` (canonical npm-standalone produce mechanism — imported directly by AC2)